{% if page_obj and page_obj.paginator.num_pages > 1 %}
<nav class="pagination">
  {% if page_obj.has_previous %}<a href="?page={{ page_obj.previous_page_number }}{% if active_skill %}&skill={{ active_skill }}{% endif %}">← Назад</a>{% endif %}
  <span>Страница {{ page_obj.number }} из {{ page_obj.paginator.num_pages }}</span>
  {% if page_obj.has_next %}<a href="?page={{ page_obj.next_page_number }}{% if active_skill %}&skill={{ active_skill }}{% endif %}">Вперёд →</a>{% endif %}
</nav>
{% endif %}
